<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Trading News Terminal</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0a0c0f">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f; --bg2:#0f1217; --bg3:#141820;
  --border:#1e2530; --border2:#2a3444;
  --text:#ffffff; --text-dim:#c8d8e8; --text-muted:#7a9ab0;
  --accent:#00d4ff; --accent2:#0099cc;
  --high:#ff3b5c; --low:#10b981; --low-bg:rgba(16,185,129,0.07); --low-border:rgba(16,185,129,0.2);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;flex-shrink:0;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-logo-icon{width:28px;height:28px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;}
.nav-logo-icon::before{content:'';width:9px;height:9px;background:var(--accent);}
.nav-logo-text{font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;}
.nav-logo-text span{color:var(--accent);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.auth-card{width:100%;max-width:440px;}
.auth-header{text-align:center;margin-bottom:32px;}
.auth-title{font-size:26px;font-weight:800;letter-spacing:-0.01em;margin-bottom:8px;}
.auth-sub{font-size:14px;color:var(--text-muted);}
.auth-box{background:var(--bg2);border:1px solid var(--border2);padding:32px;border-radius:4px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.form-input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:14px;border-radius:3px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent2);}
.form-input::placeholder{color:var(--text-muted);}
.pw-wrap{position:relative;}
.pw-wrap .form-input{padding-right:40px;}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;padding:2px 4px;line-height:1;transition:color .15s;}
.pw-toggle:hover{color:var(--text);}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:6px;}
.btn-submit{width:100%;padding:14px;background:var(--accent);color:#000;font-family:var(--font);font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;border:none;cursor:pointer;border-radius:3px;transition:all .2s;margin-top:8px;}
.btn-submit:hover{background:var(--accent2);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
.msg{display:none;padding:12px 16px;border-radius:3px;font-size:13px;margin-bottom:16px;font-weight:500;}
.msg.error{background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.3);color:var(--high);}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid var(--low-border);color:var(--low);}
.msg.show{display:block;}
.invalid-state{text-align:center;padding:20px 0;}
.invalid-icon{font-size:40px;margin-bottom:16px;}
.invalid-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.invalid-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.link-btn{display:inline-block;padding:12px 24px;background:var(--accent);color:#000;font-family:var(--font);font-size:13px;font-weight:800;letter-spacing:0.06em;border-radius:3px;text-decoration:none;transition:background .2s;}
.link-btn:hover{background:var(--accent2);}
footer{background:var(--bg2);border-top:1px solid var(--border);padding:16px 24px;text-align:center;font-size:11px;color:var(--text-muted);flex-shrink:0;}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon"></div>
    <div class="nav-logo-text">Trading <span>News</span> Terminal</div>
  </a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Choose a new password for your account</p>
    </div>

    <div class="auth-box" id="reset-box">
      <div id="msg" class="msg"></div>

      <form id="form-reset" onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="pw-wrap"><input class="form-input" id="new-password" type="password" placeholder="Min. 6 characters" required autocomplete="new-password"><button type="button" class="pw-toggle" onclick="_tpwd('new-password',this)" title="Show/hide">👁</button></div>
          <div class="form-hint">Minimum 6 characters</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="pw-wrap"><input class="form-input" id="confirm-password" type="password" placeholder="Repeat your password" required autocomplete="new-password"><button type="button" class="pw-toggle" onclick="_tpwd('confirm-password',this)" title="Show/hide">👁</button></div>
        </div>
        <button type="submit" class="btn-submit" id="btn-reset">Set New Password</button>
      </form>
    </div>
  </div>
</main>

<footer>© 2026 Trading News Terminal — Real-time Market Intelligence</footer>

<script>
const BACKEND = 'https://trading-news-terminal-backend-production.up.railway.app';
const LOGIN_URL = '/login';

const params = new URLSearchParams(location.search);
const resetToken = params.get('token');

// If no token in URL, show error immediately
if (!resetToken) {
  document.getElementById('reset-box').innerHTML = `
    <div class="invalid-state">
      <div class="invalid-icon">⚠️</div>
      <div class="invalid-title">Invalid Reset Link</div>
      <div class="invalid-sub">This password reset link is missing or malformed.<br>Please request a new one.</div>
      <a href="${LOGIN_URL}" class="link-btn">Back to Sign In</a>
    </div>`;
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}

async function handleReset(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-reset');
  const password = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;

  if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
  if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    const r = await fetch(BACKEND + '/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: resetToken, password})
    });
    const data = await r.json();
    if (r.ok && data.success) {
      document.getElementById('reset-box').innerHTML = `
        <div class="invalid-state">
          <div class="invalid-icon">✅</div>
          <div class="invalid-title">Password Updated!</div>
          <div class="invalid-sub">Your password has been changed successfully.</div>
          <a href="${LOGIN_URL}" class="link-btn">Sign In → Open Terminal</a>
        </div>`;
    } else {
      showMsg(data.detail || 'Failed to reset password. The link may have expired.', 'error');
      btn.disabled = false; btn.textContent = 'Set New Password';
    }
  } catch(err) {
    showMsg('Connection error. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Set New Password';
  }
}
function _tpwd(id, btn) {
  const inp = document.getElementById(id);
  if (!inp) return;
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}
</script>
</body>
</html>
