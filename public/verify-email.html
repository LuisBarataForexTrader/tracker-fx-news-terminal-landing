<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — Trading News Terminal</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f; --bg2:#0f1217; --bg3:#141820;
  --border:#1e2530; --border2:#2a3444;
  --text:#ffffff; --text-dim:#c8d8e8; --text-muted:#7a9ab0;
  --accent:#00d4ff; --accent2:#0099cc;
  --high:#ff3b5c; --low:#10b981; --low-bg:rgba(16,185,129,0.07); --low-border:rgba(16,185,129,0.2);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-logo-icon{width:28px;height:28px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;}
.nav-logo-icon::before{content:'';width:9px;height:9px;background:var(--accent);}
.nav-logo-text{font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;}
.nav-logo-text span{color:var(--accent);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border2);padding:40px 32px;border-radius:4px;text-align:center;}
.icon{font-size:48px;margin-bottom:20px;}
.title{font-size:22px;font-weight:800;margin-bottom:10px;}
.sub{font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:28px;}
.btn{display:inline-block;padding:14px 28px;background:var(--accent);color:#000;font-family:var(--font);font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;border:none;cursor:pointer;border-radius:3px;text-decoration:none;transition:background .2s;}
.btn:hover{background:var(--accent2);}
.msg{padding:12px 16px;border-radius:3px;font-size:13px;margin-bottom:20px;font-weight:500;}
.msg.error{background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.3);color:var(--high);}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid var(--low-border);color:var(--low);}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
footer{background:var(--bg2);border-top:1px solid var(--border);padding:16px 24px;text-align:center;font-size:11px;color:var(--text-muted);flex-shrink:0;}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon"></div>
    <div class="nav-logo-text">Trading <span>News</span> Terminal</div>
  </a>
</nav>

<main>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <div class="title">Verifying your email…</div>
    <div class="sub">Please wait a moment.</div>
  </div>
</main>

<footer>© 2026 Trading News Terminal — Real-time Market Intelligence</footer>

<script>
const BACKEND = 'https://trading-news-terminal-backend-production.up.railway.app';
const LOGIN_URL = '/login.html';

async function verifyEmail() {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const card = document.getElementById('card');

  if (!token) {
    card.innerHTML = `
      <div class="icon">⚠️</div>
      <div class="title">Invalid Link</div>
      <div class="sub">This verification link is missing or malformed.</div>
      <a href="${LOGIN_URL}" class="btn">Go to Sign In</a>`;
    return;
  }

  try {
    const r = await fetch(`${BACKEND}/auth/verify-email?token=${encodeURIComponent(token)}`);
    const data = await r.json();
    if (r.ok && data.success) {
      card.innerHTML = `
        <div class="icon">✅</div>
        <div class="title">Email Verified!</div>
        <div class="sub">Your account is now active. You can sign in to access the terminal.</div>
        <a href="${LOGIN_URL}" class="btn">Sign In → Open Terminal</a>`;
    } else {
      card.innerHTML = `
        <div class="icon">❌</div>
        <div class="title">Verification Failed</div>
        <div class="sub">${data.detail || 'This link is invalid or has already been used. Please request a new one.'}</div>
        <a href="${LOGIN_URL}" class="btn">Back to Sign In</a>`;
    }
  } catch(e) {
    card.innerHTML = `
      <div class="icon">⚠️</div>
      <div class="title">Connection Error</div>
      <div class="sub">Could not reach the server. Please try again.</div>
      <a href="${LOGIN_URL}" class="btn">Back to Sign In</a>`;
  }
}

verifyEmail();
</script>
</body>
</html>
